# Kubernetes identity
open_webui_namespace: open-webui
open_webui_name: open-webui

# Container image
open_webui_image: ghcr.io/open-webui/open-webui:main
open_webui_port: 8080

# Ollama backend (Docker container on k3d-dev network)
open_webui_ollama_base_url: "http://ollama-ext:11434"

# Persistent storage (k3s local-path-provisioner)
open_webui_pvc_name: open-webui-data
open_webui_pvc_size: 5Gi

# Optional / future (Ingress)
open_webui_host: webui.local

# TLS (self-signed, local)
open_webui_tls_cert: "/home/soundwave/certs/webui.crt"
open_webui_tls_key:  "/home/soundwave/certs/webui.key"
