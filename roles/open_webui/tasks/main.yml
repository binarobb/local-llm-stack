- name: Deploy Open WebUI Kubernetes resources
  become: false
  kubernetes.core.k8s:
    state: present
    definition: "{{ lookup('template', item) }}"
    kubeconfig: "{{ lookup('env','HOME') + '/.k3d/kubeconfig-dev.yaml' }}"
  loop:
    - namespace.yaml.j2
    - pvc.yaml.j2
    - deployment.yaml.j2
    - service.yaml.j2
    - tls-secret.yaml.j2
    - middleware-redirect-https.yaml.j2  
    - ingress.yaml.j2
    - ingress-http-redirect.yaml.j2
  tags: [k8s, webui]

- name: Wait for Open WebUI pod to be ready
  become: false
  kubernetes.core.k8s_info:
    kind: Pod
    namespace: "{{ open_webui_namespace }}"
    label_selectors:
      - "app={{ open_webui_name }}"
    kubeconfig: "{{ lookup('env','HOME') + '/.k3d/kubeconfig-dev.yaml' }}"
  register: webui_pods
  changed_when: false
  until: >
    webui_pods.resources | length > 0 and
    (webui_pods.resources[0].status.containerStatuses[0].ready | default(false))
  retries: 30
  delay: 2
  tags: [k8s, webui, wait]
